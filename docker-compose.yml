name: flink-sigma-detector

services:
  # Flink JobManager - runs job in APPLICATION mode using standalone-job.sh
  jobmanager:
    build: .
    container_name: flink-jobmanager
    command: >
      /opt/flink/bin/standalone-job.sh start-foreground
      --pyModule app.main
      --pyFiles /opt/flink/usrlib
      --job-id local
    env_file:
      - .env
    environment:
      # Flink Cluster Configuration (Docker-specific, not in .env)
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: ${FLINK_PARALLELISM:-2}
        rest.port: 8081
        rest.bind-port: 8081
        rest.address: 0.0.0.0
      # Flink JVM Options (Docker-specific, not in .env)
      - FLINK_ENV_JAVA_OPTS=-Dlog4j2.configurationFile=file:/opt/flink/usrlib/log4j2.properties --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED
    ports:
      - "8081:8081"
    volumes:
      - ./logs:/opt/flink/usrlib/logs
      - flink-checkpoints:/opt/flink/checkpoints
    networks:
      - flink-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/jobs/overview || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 1G

  # Flink TaskManager - executes the job tasks
  taskmanager:
    build: .
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - jobmanager
    env_file:
      - .env
    environment:
      # Flink Cluster Configuration (Docker-specific, not in .env)
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: ${FLINK_PARALLELISM:-2}
      # Flink JVM Options (Docker-specific, not in .env)
      - FLINK_ENV_JAVA_OPTS=-Dlog4j2.configurationFile=file:/opt/flink/usrlib/log4j2.properties --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED
    volumes:
      - ./logs:/opt/flink/usrlib/logs
      - flink-checkpoints:/opt/flink/checkpoints
    networks:
      - flink-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '2'
          memory: 2G

networks:
  flink-network:
    driver: bridge

volumes:
  flink-checkpoints:
